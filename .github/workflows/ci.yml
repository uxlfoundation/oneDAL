name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # use workflow dispatch to regenerate cache
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

env:
  WINDOWS_ALL_COMPONENTS: 'intel.oneapi.win.cpp-dpcpp-common:intel.oneapi.win.mkl.devel:intel.oneapi.win.tbb.devel'
  DPCTL_VERSION: '0.21.1'
  DPNP_VERSION: '0.19.1'
  DPCTL_PY_VERSIONS: '3.10\|3.14'

jobs:
  LinuxMakeDPCPP:
    if: github.repository == 'uxlfoundation/oneDAL'
    strategy:
      fail-fast: false
      matrix:
        include:
          - ISA: avx2
            runner: ubuntu-24.04

    runs-on: ${{ matrix.runner }}
    name: LinuxMakeDPCPP(${{ matrix.ISA }})
    timeout-minutes: 360

    steps:
      - name: Checkout oneDAL
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install DPC++
        run: .ci/env/apt.sh dpcpp
      - name: Install MKL
        run: .ci/env/apt.sh mkl
      - name: System Info
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/describe_system.sh
      - name: Set environment variables
        run: |
          # reduce GPU driver/runner related memory issues
          echo "NEOReadDebugKeys=1" >> "$GITHUB_ENV"
          echo "EnableRecoverablePageFaults=1" >> "$GITHUB_ENV"
          echo "GpuFaultCheckThreshold=0" >> "$GITHUB_ENV"
      - name: Make daal debug
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/build.sh --compiler icx  --optimizations ${{ matrix.ISA }} --target daal --debug symbols --jobs 20
          if [[ ${{ matrix.runner }} != ubuntu-24.04 ]];then cp -r __work __work_daal;fi
      - name: Make onedal debug
        id: onedal-dbg
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/build.sh --compiler icx  --optimizations ${{ matrix.ISA }} --target oneapi_c --debug symbols --jobs 20
          rm -rf __work
          .ci/scripts/build.sh --compiler icx  --optimizations ${{ matrix.ISA }} --target oneapi_dpc --debug symbols --jobs 20
          # clean up build directory due to space limitations
          rm -rf __work
          echo "key=__release_lnx-$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Prepare Cache build
        if: github.event_name != 'pull_request'
        run: cp -r __release_lnx __release_lnx_main
      - name: Cache build
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@v5
        with:
          key: ${{ steps.onedal-dbg.outputs.key }}
          path: ./__release_lnx_main
      - name: Remove Cache build
        if: github.event_name != 'pull_request'
        run: rm -rf __release_lnx_main
      - name: Archive build
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: __release_lnx
          path: ./__release_lnx
      - name: Archive oneDAL environment
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: oneDAL_env
          path: .ci/env
      - name: Make onedal
        if: matrix.runner != 'ubuntu-24.04'
        run: |
          # generate new onedal portion for use in examples testing (due to issues with dpc debug build)
          source /opt/intel/oneapi/setvars.sh
          rm -rf __work
          mv __work_daal __work
          .ci/scripts/build.sh --compiler icx  --optimizations ${{ matrix.ISA }} --target onedal --jobs 20
          rm -rf __work
      - name: daal/cpp examples
        run: |
            source /opt/intel/oneapi/setvars.sh
            .ci/scripts/test.sh --test-kind examples --build-dir __release_lnx --compiler icx --interface daal/cpp --build-system cmake
      - name: oneapi/cpp examples
        run: |
            source /opt/intel/oneapi/setvars.sh
            .ci/scripts/test.sh --test-kind examples --build-dir __release_lnx --compiler icx --interface oneapi/cpp --build-system cmake
      - name: oneapi/dpc examples
        if: matrix.runner != 'ubuntu-24.04'
        run: |
            source /opt/intel/oneapi/setvars.sh
            .ci/scripts/test.sh --test-kind examples --build-dir __release_lnx --compiler icx --interface oneapi/dpc --build-system cmake
      # Miniforge is necessary in order to get Intel MPI from conda-forge for MPI samples
      - name: Install Miniforge
        run: .ci/env/apt.sh miniforge
      - name: daal/cpp/mpi samples
        run: |
            source /opt/intel/oneapi/setvars.sh
            .ci/scripts/test.sh --test-kind samples --build-dir __release_lnx --compiler gnu --interface daal/cpp/mpi --conda-env ci-env --build-system cmake

  LinuxABICheck:
    name: ABI Conformance(avx2)
    needs: LinuxMakeDPCPP
    if: |
      github.repository == 'uxlfoundation/oneDAL' &&
      github.event_name == 'pull_request' &&
      ! contains(toJson(github.event.pull_request.labels.*.name), '"API/ABI breaking change"')
    runs-on: ubuntu-24.04
    env:
      LIBABIGAIL_DEFAULT_USER_SUPPRESSION_FILE: ${{ github.workspace }}/.github/.abignore
    timeout-minutes: 20

    steps:
      - name: Checkout oneDAL
        uses: actions/checkout@v6
      - name: install ABI checking tools
        run: .ci/env/apt.sh abigail
      - name: Check Cache
        id: get-cache-key
        run: |
          CACHE_KEY=`gh cache list --sort created_at --key __release_lnx --json key --jq .[0].key`
          echo "key=${CACHE_KEY}" >> "$GITHUB_OUTPUT"
          echo $CACHE_KEY
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Download oneDAL main build
        uses: actions/cache/restore@v5
        with:
          path: ./__release_lnx_main
          key: ${{ steps.get-cache-key.outputs.key }}
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          path: ./__release_lnx
      - name: Check ABI conformance
        run: |
          echo "Note: This check uses abidiff to verify ABI compliance of an SSE/AVX512 debug oneDAL build."
          echo "It compares to the last completed main build, whose commit can be found in the 'Check Cache' step."
          echo "The ABI for other ISAs are assumed to match the SSE or AVX512 version, any ISA-specific exported "
          echo "information that is ISA unique must be manually checked. If no shared objects are found, then "
          echo "please rerun the main 'CI' workflow via GitHub's workflow dispatch to regenerate the cache."
          echo "Keep the branch up to date with oneDAL 'main' as it may otherwise not contain the latest changes "
          echo "in the ABI that can lead to erroneous failures in the ABI check."
          .ci/scripts/abi_check.sh __release_lnx_main/daal/latest/lib/intel64/ __release_lnx/daal/latest/lib/intel64/

  WindowsMakeDPCPP:
    if: |
      github.repository == 'uxlfoundation/oneDAL' &&
      github.event_name == 'pull_request'
    runs-on: windows-2025
    name: WindowsMakeDPCPP
    timeout-minutes: 180

    steps:
      - name: Checkout oneDAL
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install DPC++
        shell: cmd
        run: |
          set PATH=C:\msys64\usr\bin;%PATH%
          for /f "delims=" %%i in ('grep -oP -m 1 "(?<=WINDOWS_BASEKIT_URL: ).*" .ci\pipeline\ci.yml') do set "baseurl=%%i"
          call .ci\scripts\install_basekit.bat %baseurl:'="% ${{ env.WINDOWS_ALL_COMPONENTS }} .\oneapi\
      - name: Prepare Intel OpenCL CPU runtime
        run: |
          & .ci/scripts/collect_opencl_rt.ps1
      - name: System Info
        shell: cmd
        run: |
          set PATH=C:\msys64\usr\bin;%PATH%
          pip install cpufeature
          call .\oneapi\setvars.bat
          bash .ci/scripts/describe_system.sh
      - name: Make daal
        shell: cmd
        run: |
          call .\oneapi\setvars.bat
          call .\.ci\scripts\build.bat daal vc avx2
      - name: Make onedal_dpc
        shell: cmd
        run: |
          call .\oneapi\setvars.bat
          call .\oneapi\compiler\latest\bin\sycl-ls.exe
          call .\.ci\scripts\build.bat onedal_dpc vc avx2
      - name: Compress Intel BaseKit
        shell: cmd
        run: |
          for /D %%s in (.\oneapi\*) do for /f "tokens=2 delims=[]" %%H in ('dir /al %%s\ ^| findstr /i /c:"latest"') do rmdir %%s\latest & mklink /D %%s\latest .\%%~nxH
          tar -cvzf oneapi.tar.gz .\oneapi
      - name: Archive build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: __release_win
          path: .\__release_win_vc
      - name: Archive Intel BaseKit
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: intel_oneapi_basekit
          path: .\oneapi.tar.gz
      - name: Archive Intel OpenCL CPU runtime
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: opencl_rt_installer
          path: .\opencl_rt.msi

  LinuxSklearnex:
    needs: LinuxMakeDPCPP
    if: |
      github.repository == 'uxlfoundation/oneDAL' &&
      github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - PYTHON_VERSION: '3.10'
            SKLEARN_VERSION: '1.0'
          - PYTHON_VERSION: '3.13'
            SKLEARN_VERSION: '1.7'
          - PYTHON_VERSION: '3.14'
            SKLEARN_VERSION: '1.8'
    name: LinuxSklearnex(Py${{ matrix.PYTHON_VERSION }}_Sklearn${{ matrix.SKLEARN_VERSION }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout scikit-learn-intelex
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: uxlfoundation/scikit-learn-intelex
      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v8.0.0
        with:
          name: __release_lnx
          path: ./__release_lnx
      - name: Download oneDAL environment artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v8.0.0
        with:
          name: oneDAL_env
          path: .ci/env
      - name: Set Environment Variables
        id: set-env
        run: |
          echo "NO_DIST=1" >> "$GITHUB_ENV"
          DPCFLAG="0"
          if [ $(echo ${{ matrix.PYTHON_VERSION }} | grep '${{ env.DPCTL_PY_VERSIONS }}') ]; then DPCFLAG=''; fi
          echo "DPCFLAG=${DPCFLAG}" >> "$GITHUB_OUTPUT"
      - name: apt-get
        run: sudo apt-get update
      - name: Install DPC++
        run: |
          bash .ci/env/apt.sh dpcpp
      - name: System Info
        run: |
          source /opt/intel/oneapi/setvars.sh
          bash .ci/scripts/describe_system.sh
      - name: Install develop requirements
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r dependencies-dev
          pip list
      - name: Build daal4py/sklearnex
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh ${{ steps.set-env.outputs.DPCFLAG }}
          python setup.py install --single-version-externally-managed --record=record.txt
      - name: Install testing requirements
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          bash .ci/scripts/setup_sklearn.sh ${{ matrix.SKLEARN_VERSION }}
          pip install --upgrade -r requirements-test.txt
          pip install $(python .ci/scripts/get_compatible_scipy_version.py ${{ matrix.SKLEARN_VERSION }}) pyyaml
          if [ "${{ steps.set-env.outputs.DPCFLAG }}" == "" ]; then pip install dpctl==${{ env.DPCTL_VERSION }} dpnp==${{ env.DPNP_VERSION }}; fi
          pip list
      - name: Sklearnex testing
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearnex
          cd .ci
          ../conda-recipe/run_test.sh
      - name: Sklearn testing
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearn
          if [ "${{ steps.set-env.outputs.DPCFLAG }}" == "" ]; then export CPU=cpu; fi
          bash .ci/scripts/run_sklearn_tests.sh $CPU
      - name: Sklearn testing [preview]
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          if [ "${{ steps.set-env.outputs.DPCFLAG }}" == "" ]; then export CPU=cpu; fi
          export SKLEARNEX_PREVIEW='YES'
          bash .ci/scripts/run_sklearn_tests.sh $CPU

  WindowsSklearnex:
    needs: WindowsMakeDPCPP
    if: |
      github.repository == 'uxlfoundation/oneDAL' &&
      github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - PYTHON_VERSION: '3.10'
            SKLEARN_VERSION: '1.0'
          - PYTHON_VERSION: '3.13'
            SKLEARN_VERSION: '1.7'
          - PYTHON_VERSION: '3.14'
            SKLEARN_VERSION: '1.8'
    name: WindowsSklearnex(Py${{ matrix.PYTHON_VERSION }}_Sklearn${{ matrix.SKLEARN_VERSION }})
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout scikit-learn-intelex
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: uxlfoundation/scikit-learn-intelex
      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v8.0.0
        with:
          name: __release_win
          path: ./__release_win
      - name: Download Intel BaseKit artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v8.0.0
        with:
          name: intel_oneapi_basekit
      - name: Decompress Intel BaseKit
        shell: cmd
        run: |
          tar -xvzf oneapi.tar.gz
          echo Unzip complete
      - name: Set Environment Variables
        id: set-env
        shell: cmd
        run: |
          echo C:\msys64\usr\bin;>> %GITHUB_PATH%
          echo NO_DIST=YES>> %GITHUB_ENV%
          set DPCTL_TEMP="${{ env.DPCTL_PY_VERSIONS }}"
          if not %DPCTL_TEMP:${{ matrix.PYTHON_VERSION }}=%==%DPCTL_TEMP% (
            echo DPCFLAG=>> %GITHUB_OUTPUT%
          ) else (
            echo DPCFLAG="0">> %GITHUB_OUTPUT%
          )
      - name: Download Intel OpenCL CPU Runtime artifact
        if: ${{ steps.set-env.outputs.DPCFLAG == '' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v8.0.0
        with:
          name: opencl_rt_installer
          path: .
      - name: Install Intel OpenCL CPU Runtime
        if: ${{ steps.set-env.outputs.DPCFLAG == '' }}
        run: |
          Start-Process msiexec -ArgumentList "/i opencl_rt.msi /qn" -Wait
          echo "Installed Intel OpenCL CPU Runtime"
      - name: Install dependencies
        shell: cmd
        run: |
          python -m venv venv
          call .\venv\Scripts\activate.bat
          pip install --upgrade setuptools
          pip install cpufeature pyyaml
          pip install -r dependencies-dev
      - name: System Info
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\oneapi\setvars.bat
          bash .ci/scripts/describe_system.sh
      - name: Build daal4py/sklearnex
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          set PREFIX=.
          set PYTHON=python
          call .\conda-recipe\bld.bat
      - name: Install testing requirements
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          bash .ci/scripts/setup_sklearn.sh ${{ matrix.SKLEARN_VERSION }}
          pip install --upgrade -r requirements-test.txt
          for /f "delims=" %%c in ('python .ci\scripts\get_compatible_scipy_version.py ${{ matrix.SKLEARN_VERSION }}') do set SCIPY_VERSION=%%c
          pip install %SCIPY_VERSION%
          if "${{ steps.set-env.outputs.DPCFLAG }}"=="" pip install dpctl==${{ env.DPCTL_VERSION }} dpnp==${{ env.DPNP_VERSION }}
          pip list
      - name: Sklearnex testing
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          set PYTHON=python
          set COVERAGE_FILE=%cd%\.coverage.sklearnex
          call .\conda-recipe\run_test.bat .\
      - name: Sklearn testing
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          set COVERAGE_FILE=%cd%\.coverage.sklearn
          if "${{ steps.set-env.outputs.DPCFLAG }}"=="" set CPU=cpu
          bash .ci/scripts/run_sklearn_tests.sh %CPU%
      - name: Sklearn testing [preview]
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          if "${{ steps.set-env.outputs.DPCFLAG }}"=="" set CPU=cpu
          set SKLEARNEX_PREVIEW=YES
          bash .ci/scripts/run_sklearn_tests.sh %CPU%
