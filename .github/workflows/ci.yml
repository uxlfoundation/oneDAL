name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # use workflow dispatch to regenerate cache
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  LinuxMakeDPCPP:
    if: github.repository == 'uxlfoundation/oneDAL'
    strategy:
      fail-fast: false
      matrix:
        include:
          - ISA: avx2
            runner: ubuntu-24.04

    runs-on: ${{ matrix.runner }}
    name: LinuxMakeDPCPP(${{ matrix.ISA }})
    timeout-minutes: 360

    steps:
      - name: Checkout oneDAL
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install DPC++
        run: .ci/env/apt.sh dpcpp
      - name: Install MKL
        run: .ci/env/apt.sh mkl
      - name: System Info
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/describe_system.sh
      - name: Set environment variables
        run: |
          # reduce GPU driver/runner related memory issues
          echo "NEOReadDebugKeys=1" >> "$GITHUB_ENV"
          echo "EnableRecoverablePageFaults=1" >> "$GITHUB_ENV"
          echo "GpuFaultCheckThreshold=0" >> "$GITHUB_ENV"
      - name: Make daal debug
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/build.sh --compiler icx  --optimizations ${{ matrix.ISA }} --target daal --debug symbols --jobs 20
          if [[ ${{ matrix.runner }} != ubuntu-24.04 ]];then cp -r __work __work_daal;fi
      - name: Make onedal debug
        id: onedal-dbg
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/build.sh --compiler icx  --optimizations ${{ matrix.ISA }} --target oneapi_c --debug symbols --jobs 20
          rm -rf __work
          .ci/scripts/build.sh --compiler icx  --optimizations ${{ matrix.ISA }} --target oneapi_dpc --debug symbols --jobs 20
          # clean up build directory due to space limitations
          rm -rf __work
          echo "key=__release_lnx-$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Prepare Cache build
        if: github.event_name != 'pull_request'
        run: cp -r __release_lnx __release_lnx_main
      - name: Cache build
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@v6
        with:
          key: ${{ steps.onedal-dbg.outputs.key }}
          path: ./__release_lnx_main
      - name: Remove Cache build
        if: github.event_name != 'pull_request'
        run: rm -rf __release_lnx_main
      - name: Archive build
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: __release_lnx
          path: ./__release_lnx
      - name: Make onedal
        if: matrix.runner != 'ubuntu-24.04'
        run: |
          # generate new onedal portion for use in examples testing (due to issues with dpc debug build)
          source /opt/intel/oneapi/setvars.sh
          rm -rf __work
          mv __work_daal __work
          .ci/scripts/build.sh --compiler icx  --optimizations ${{ matrix.ISA }} --target onedal --jobs 20
          rm -rf __work
      - name: daal/cpp examples
        run: |
            source /opt/intel/oneapi/setvars.sh
            .ci/scripts/test.sh --test-kind examples --build-dir __release_lnx --compiler icx --interface daal/cpp --build-system cmake
      - name: oneapi/cpp examples
        run: |
            source /opt/intel/oneapi/setvars.sh
            .ci/scripts/test.sh --test-kind examples --build-dir __release_lnx --compiler icx --interface oneapi/cpp --build-system cmake
      - name: oneapi/dpc examples
        if: matrix.runner != 'ubuntu-24.04'
        run: |
            source /opt/intel/oneapi/setvars.sh
            .ci/scripts/test.sh --test-kind examples --build-dir __release_lnx --compiler icx --interface oneapi/dpc --build-system cmake
      # Miniforge is necessary in order to get Intel MPI from conda-forge for MPI samples
      - name: Install Miniforge
        run: .ci/env/apt.sh miniforge
      - name: daal/cpp/mpi samples
        run: |
            source /opt/intel/oneapi/setvars.sh
            .ci/scripts/test.sh --test-kind samples --build-dir __release_lnx --compiler gnu --interface daal/cpp/mpi --conda-env ci-env --build-system cmake

  LinuxABICheck:
    name: ABI Conformance(avx2)
    needs: LinuxMakeDPCPP
    if: |
      github.repository == 'uxlfoundation/oneDAL' &&
      github.event_name == 'pull_request' &&
      ! contains(toJson(github.event.pull_request.labels.*.name), '"API/ABI breaking change"')
    runs-on: ubuntu-24.04
    env:
      LIBABIGAIL_DEFAULT_USER_SUPPRESSION_FILE: ${{ github.workspace }}/.github/.abignore
    timeout-minutes: 20

    steps:
      - name: Checkout oneDAL
        uses: actions/checkout@v7
      - name: install ABI checking tools
        run: .ci/env/apt.sh abigail
      - name: Check Cache
        id: get-cache-key
        run: |
          CACHE_KEY=`gh cache list --sort created_at --key __release_lnx --json key --jq .[0].key`
          echo "key=${CACHE_KEY}" >> "$GITHUB_OUTPUT"
          echo $CACHE_KEY
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Download oneDAL main build
        uses: actions/cache/restore@v6
        with:
          path: ./__release_lnx_main
          key: ${{ steps.get-cache-key.outputs.key }}
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          path: ./__release_lnx
      - name: Check ABI conformance
        run: |
          echo "Note: This check uses abidiff to verify ABI compliance of an SSE/AVX512 debug oneDAL build."
          echo "It compares to the last completed main build, whose commit can be found in the 'Check Cache' step."
          echo "The ABI for other ISAs are assumed to match the SSE or AVX512 version, any ISA-specific exported "
          echo "information that is ISA unique must be manually checked. If no shared objects are found, then "
          echo "please rerun the main 'CI' workflow via GitHub's workflow dispatch to regenerate the cache."
          echo "Keep the branch up to date with oneDAL 'main' as it may otherwise not contain the latest changes "
          echo "in the ABI that can lead to erroneous failures in the ABI check."
          .ci/scripts/abi_check.sh __release_lnx_main/daal/latest/lib/intel64/ __release_lnx/daal/latest/lib/intel64/

  LinuxAbicheckScan:
    name: Abicheck (source scan + binary, avx2)
    needs: LinuxMakeDPCPP
    if: |
      github.repository == 'uxlfoundation/oneDAL' &&
      github.event_name == 'pull_request' &&
      ! contains(toJson(github.event.pull_request.labels.*.name), '"API/ABI breaking change"')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout oneDAL
        uses: actions/checkout@v6
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v7
        with:
          name: __release_lnx
          path: ./__release_lnx
      # abicheck's scan/dump modes reject a directory for new-library (they
      # analyse exactly one artifact, no per-library fan-out) -- resolve the
      # first built .so, same enumeration abi_check.sh already uses above.
      - name: Resolve the built shared library
        id: solib
        run: |
          solib=$(ls __release_lnx/daal/latest/lib/intel64/lib*.so | head -1)
          echo "path=${solib}" >> "$GITHUB_OUTPUT"
      - name: Install DPC++
        run: .ci/env/apt.sh dpcpp
      # Put icpx on PATH for every later step, and persist CMPLR_ROOT so
      # collect-facts' clang-plugin producer can auto-detect it points at
      # icpx's own bundled LLVM/Clang CMake package (see the pinned commit
      # comment below) -- a sourced env only lives for the step that
      # sourced it otherwise.
      - name: Put icpx on PATH
        run: |
          source /opt/intel/oneapi/setvars.sh
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "CMPLR_ROOT=$CMPLR_ROOT" >> "$GITHUB_ENV"
      # collect-facts' clang-plugin producer detects icpx's LLVM major via
      # its __clang_major__ macro (icpx --version prints a vendor product
      # version, not an LLVM number, so plain upstream abicheck main cannot
      # detect it -- see abicheck/abicheck#603, an unmerged fix pinned below
      # rather than @main until it lands), builds the plugin against icpx's
      # own bundled LLVM/Clang CMake package under $CMPLR_ROOT, smoke-tests
      # it loads into icpx, and hands back $ABICHECK_PLUGIN_FLAGS.
      - name: Collect source facts (prepare)
        uses: abicheck/abicheck/actions/collect-facts@f1eb76d081f4f536168523c5ed0af626b3ab8864 # TEMP: unmerged fix for icpx/icx support (abicheck/abicheck#603) -- revert to @main once merged
        with:
          phase: prepare
          producer: clang-plugin
          compiler: icpx
          public-roots: |
            cpp/daal/include
            cpp/oneapi
          output: __abicheck_inputs
      - name: Emit facts for the public API surface
        run: |
          icpx -std=c++17 -Icpp/daal/include $ABICHECK_PLUGIN_FLAGS -fsyntax-only cpp/daal/include/daal.h
          icpx -std=c++17 -fsycl -Icpp/oneapi $ABICHECK_PLUGIN_FLAGS -fsyntax-only cpp/oneapi/dal.hpp
      - name: Collect source facts (verify)
        uses: abicheck/abicheck/actions/collect-facts@f1eb76d081f4f536168523c5ed0af626b3ab8864 # TEMP: unmerged fix for icpx/icx support (abicheck/abicheck#603) -- revert to @main once merged
        with:
          phase: verify
          producer: clang-plugin
          output: __abicheck_inputs
      # mode: scan only supports format: text/json -- format: sarif and
      # upload-sarif are compare-mode only and hard-rejected by the Action's
      # validate-inputs.sh. --annotate is also compare-mode only (cli_scan.py
      # has no such option). Results surface via the Action's automatic job
      # summary instead (add-job-summary defaults to true and covers every
      # mode except dump). scan also has no --suppress (compare-mode only,
      # confirmed against abicheck's own CLI/Action source) -- suppression
      # instead goes through --crosscheck category severities below, and
      # fail-on-api-break stays false until those are tuned.
      - name: Run abicheck
        uses: abicheck/abicheck@ffa860cfc5e4c080905ee6a5eeb1947534e010be # main
        with:
          mode: scan
          new-library: ${{ steps.solib.outputs.path }}
          new-header: "cpp/daal/include cpp/oneapi/dal"
          build-info: __abicheck_inputs
          depth: source
          abi-baseline: .github/abicheck-baselines/2026.0.0.abicheck.json
          crosscheck: "header_build_context_mismatch=warning"
          fail-on-breaking: 'true'
          fail-on-api-break: 'false'
          github-token: ${{ secrets.GITHUB_TOKEN }}
