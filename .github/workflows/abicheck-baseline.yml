name: Publish Abicheck Baseline

on:
  workflow_dispatch:
    inputs:
      baseline_tag:
        description: "oneDAL release tag to publish as the abicheck baseline"
        required: true
        default: "2026.0.0"

permissions:
  contents: write

jobs:
  PublishBaseline:
    if: github.repository == 'uxlfoundation/oneDAL'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout oneDAL at baseline tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.baseline_tag }}

      # The abicheck CI scripts are newer than most historical release tags,
      # so fetch them from the ref that is running this workflow (not the
      # baseline tag) and lay them over the checked-out tree.
      - name: Fetch current abicheck CI scripts
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          sparse-checkout: |
            .ci/scripts/abicheck_build_plugin.sh
            .ci/scripts/abicheck_emit_facts.sh
          path: __abicheck_tooling
      - name: Overlay abicheck CI scripts
        run: cp __abicheck_tooling/.ci/scripts/abicheck_*.sh .ci/scripts/

      - name: Install DPC++
        run: .ci/env/apt.sh dpcpp
      - name: Install MKL
        run: .ci/env/apt.sh mkl

      # Same flags as the PR-side LinuxMakeDPCPP job in ci.yml, so the baseline
      # binary matches what every PR's LinuxAbicheck job actually compares against.
      - name: Build daal (avx2 debug)
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/build.sh --compiler icx --optimizations avx2 --target daal --debug symbols --jobs 20

      - name: Build abicheck-facts Clang plugin (against icx's bundled LLVM/Clang)
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/abicheck_build_plugin.sh __abicheck_plugin
      - name: Emit source facts via the Clang plugin
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/abicheck_emit_facts.sh __abicheck_plugin/libabicheck-facts.so __abicheck_inputs

      - name: Dump baseline snapshot
        id: abicheck-dump
        uses: abicheck/abicheck@d28c0bf28796b3c6daca9584ad6dd44b54f044f7 # v0.5.0
        with:
          mode: dump
          new-library: __release_lnx/daal/latest/lib/intel64
          new-header: "cpp/daal/include cpp/oneapi/dal"
          new-version: ${{ inputs.baseline_tag }}
          build-info: __abicheck_inputs
          depth: source
          output-file: "${{ inputs.baseline_tag }}.abicheck.json"

      - name: Attach snapshot to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ inputs.baseline_tag }}" "${{ steps.abicheck-dump.outputs.report-path }}" --clobber
