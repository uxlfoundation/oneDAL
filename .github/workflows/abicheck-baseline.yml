name: Publish Abicheck Baseline

on:
  workflow_dispatch:
    inputs:
      baseline_tag:
        description: "oneDAL release tag to publish as the abicheck baseline"
        required: true
        default: "2026.0.0"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  PublishBaseline:
    if: github.repository == 'uxlfoundation/oneDAL'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Resolve baseline tag
        id: baseline
        run: |
          tag="${{ inputs.baseline_tag }}"
          if [ -z "$tag" ]; then
            tag="${{ github.event.release.tag_name }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      # Explicitly on `main` (not whatever ref triggered this workflow --
      # for the `release: published` trigger that would be the release's
      # tag/commit, not a branch) since the dump gets committed back here.
      - name: Checkout oneDAL main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Checkout oneDAL sources at the baseline tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.baseline.outputs.tag }}
          path: __baseline_src

      - name: Install DPC++
        working-directory: __baseline_src
        run: .ci/env/apt.sh dpcpp
      - name: Install MKL
        working-directory: __baseline_src
        run: .ci/env/apt.sh mkl

      # Same flags as the PR-side LinuxMakeDPCPP job in ci.yml, so the baseline
      # binary matches what every PR's LinuxAbicheckScan job actually compares against.
      - name: Build daal (avx2 debug)
        working-directory: __baseline_src
        run: |
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/build.sh --compiler icx --optimizations avx2 --target daal --debug symbols --jobs 20

      # Put icpx on PATH for later steps -- see the matching comment in
      # ci.yml's LinuxAbicheckScan job for why this is needed.
      - name: Put icpx on PATH
        run: |
          source /opt/intel/oneapi/setvars.sh
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "CMPLR_ROOT=$CMPLR_ROOT" >> "$GITHUB_ENV"

      - name: Collect source facts (prepare)
        uses: abicheck/abicheck/actions/collect-facts@f1eb76d081f4f536168523c5ed0af626b3ab8864 # TEMP: unmerged fix for icpx/icx support (abicheck/abicheck#603) -- revert to @main once merged
        with:
          phase: prepare
          producer: clang-plugin
          compiler: icpx
          public-roots: |
            __baseline_src/cpp/daal/include
            __baseline_src/cpp/oneapi
          output: __abicheck_inputs
      - name: Emit facts for the public API surface
        working-directory: __baseline_src
        run: |
          icpx -std=c++17 -Icpp/daal/include $ABICHECK_PLUGIN_FLAGS -fsyntax-only cpp/daal/include/daal.h
          icpx -std=c++17 -fsycl -Icpp/oneapi $ABICHECK_PLUGIN_FLAGS -fsyntax-only cpp/oneapi/dal.hpp
      - name: Collect source facts (verify)
        uses: abicheck/abicheck/actions/collect-facts@f1eb76d081f4f536168523c5ed0af626b3ab8864 # TEMP: unmerged fix for icpx/icx support (abicheck/abicheck#603) -- revert to @main once merged
        with:
          phase: verify
          producer: clang-plugin
          output: __abicheck_inputs

      - name: Ensure baseline output directory exists
        run: mkdir -p .github/abicheck-baselines

      # dump mode rejects a directory for new-library (it analyses exactly
      # one artifact, same as scan) -- resolve the first built .so.
      - name: Resolve the built shared library
        id: solib
        run: |
          solib=$(ls __baseline_src/__release_lnx/daal/latest/lib/intel64/lib*.so | head -1)
          echo "path=${solib}" >> "$GITHUB_OUTPUT"

      - name: Dump baseline snapshot
        uses: abicheck/abicheck@ffa860cfc5e4c080905ee6a5eeb1947534e010be # main
        with:
          mode: dump
          new-library: ${{ steps.solib.outputs.path }}
          new-header: "__baseline_src/cpp/daal/include __baseline_src/cpp/oneapi/dal"
          new-version: ${{ steps.baseline.outputs.tag }}
          build-info: __abicheck_inputs
          depth: source
          output-file: ".github/abicheck-baselines/${{ steps.baseline.outputs.tag }}.abicheck.json"

      # Commit the dump directly into the repo (rather than a GitHub Release
      # asset) so the baseline PRs compare against lives in version control,
      # reviewable and diffable like any other file.
      - name: Commit baseline dump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ".github/abicheck-baselines/${{ steps.baseline.outputs.tag }}.abicheck.json"
          if git diff --cached --quiet; then
            echo "No changes to the baseline dump; nothing to commit."
            exit 0
          fi
          git commit -m "Update abicheck baseline for ${{ steps.baseline.outputs.tag }}"
          git push origin HEAD:main
