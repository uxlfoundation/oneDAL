# Mirrors the namespaces already suppressed for libabigail in .github/.abignore.

version: 1

suppressions:
  - namespace: "daal::**::internal::**"
    reason: "daal::*::internal is a documented non-public implementation namespace"
  - namespace: "oneapi::dal::**::backend::**"
    reason: "oneapi::dal::*::backend is a documented internal namespace"
  - namespace: "oneapi::dal::**::detail::**"
    reason: "oneapi::dal::*::detail is a documented internal namespace"
